<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Authentication Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #0a0a0a;
            color: #fff;
        }
        .test-section {
            background: #1a1a1a;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success {
            background: rgba(0, 217, 168, 0.2);
            border: 1px solid #00d9a8;
        }
        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
        }
        .info {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid #3b82f6;
        }
        button {
            background: #00d9a8;
            color: #0a0a0a;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #00c497;
        }
        pre {
            background: #000;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🔥 Firebase Authentication Test</h1>
    
    <div class="test-section">
        <h2>1. Firebase Initialization</h2>
        <div id="initStatus" class="status info">Testing...</div>
    </div>

    <div class="test-section">
        <h2>2. Google Provider Configuration</h2>
        <div id="providerStatus" class="status info">Testing...</div>
    </div>

    <div class="test-section">
        <h2>3. Test Google Sign-In</h2>
        <button id="testGoogleSignIn">Test Google Sign-In</button>
        <div id="signInStatus" class="status info">Click button to test</div>
    </div>

    <div class="test-section">
        <h2>4. Current User Status</h2>
        <div id="userStatus" class="status info">Checking...</div>
    </div>

    <div class="test-section">
        <h2>5. Console Logs</h2>
        <pre id="logs"></pre>
    </div>

    <script type="module">
        import {
            auth,
            googleProvider,
            signInWithPopup,
            onAuthStateChanged
        } from './js/firebase-config.js';

        const logs = [];
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            logs.push(`[${timestamp}] ${message}`);
            document.getElementById('logs').textContent = logs.join('\n');
            console.log(message);
        }

        // Test 1: Firebase Initialization
        try {
            if (auth) {
                document.getElementById('initStatus').className = 'status success';
                document.getElementById('initStatus').textContent = '✅ Firebase initialized successfully';
                log('✅ Firebase Auth initialized');
            } else {
                throw new Error('Auth object is null');
            }
        } catch (error) {
            document.getElementById('initStatus').className = 'status error';
            document.getElementById('initStatus').textContent = '❌ Firebase initialization failed: ' + error.message;
            log('❌ Firebase initialization error: ' + error.message);
        }

        // Test 2: Google Provider
        try {
            if (googleProvider) {
                document.getElementById('providerStatus').className = 'status success';
                document.getElementById('providerStatus').textContent = '✅ Google Provider configured';
                log('✅ Google Provider ready');
            } else {
                throw new Error('Google Provider is null');
            }
        } catch (error) {
            document.getElementById('providerStatus').className = 'status error';
            document.getElementById('providerStatus').textContent = '❌ Google Provider error: ' + error.message;
            log('❌ Google Provider error: ' + error.message);
        }

        // Test 3: Google Sign-In
        document.getElementById('testGoogleSignIn').addEventListener('click', async () => {
            const statusDiv = document.getElementById('signInStatus');
            statusDiv.className = 'status info';
            statusDiv.textContent = '⏳ Opening Google sign-in popup...';
            log('🔄 Attempting Google sign-in...');

            try {
                googleProvider.setCustomParameters({
                    prompt: 'select_account'
                });

                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                statusDiv.className = 'status success';
                statusDiv.innerHTML = `
                    ✅ Sign-in successful!<br>
                    Name: ${user.displayName}<br>
                    Email: ${user.email}<br>
                    UID: ${user.uid}
                `;
                log('✅ Sign-in successful: ' + user.email);

            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `
                    ❌ Sign-in failed<br>
                    Error Code: ${error.code}<br>
                    Error Message: ${error.message}<br><br>
                    <strong>Common Solutions:</strong><br>
                    ${getErrorSolution(error.code)}
                `;
                log('❌ Sign-in error: ' + error.code + ' - ' + error.message);
            }
        });

        // Test 4: Auth State
        onAuthStateChanged(auth, (user) => {
            const statusDiv = document.getElementById('userStatus');
            if (user) {
                statusDiv.className = 'status success';
                statusDiv.innerHTML = `
                    ✅ User is signed in<br>
                    Name: ${user.displayName}<br>
                    Email: ${user.email}<br>
                    UID: ${user.uid}
                `;
                log('✅ User authenticated: ' + user.email);
            } else {
                statusDiv.className = 'status info';
                statusDiv.textContent = 'ℹ️ No user signed in';
                log('ℹ️ No user currently signed in');
            }
        });

        function getErrorSolution(errorCode) {
            const solutions = {
                'auth/unauthorized-domain': '• Add your domain (127.0.0.1 or localhost) to Firebase Console → Authentication → Settings → Authorized domains',
                'auth/operation-not-allowed': '• Enable Google Sign-In in Firebase Console → Authentication → Sign-in method',
                'auth/popup-blocked': '• Allow popups for this site in your browser settings',
                'auth/popup-closed-by-user': '• You closed the popup. Try again and complete the sign-in.',
                'auth/cancelled-popup-request': '• Close any existing popups and try again'
            };
            return solutions[errorCode] || '• Check Firebase Console settings and browser console for more details';
        }

        log('🚀 Test page loaded');
    </script>
</body>
</html>
